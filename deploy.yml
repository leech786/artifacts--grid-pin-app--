name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'handy-gps/package-lock.json'

      - name: Install dependencies
        working-directory: ./handy-gps
        run: npm install --legacy-peer-deps

      - name: Build the app
        working-directory: ./handy-gps
        env:
          PORT: 3000
          BASE_PATH: /artifacts--grid-pin-app--/
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./handy-gps/dist