kind = "web"
previewPath = "/"
title = "Handy GPS"
version = "1.0.0"
id = "artifacts/handy-gps"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19705

[services.development]
run = "pnpm --filter @workspace/handy-gps run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/handy-gps", "run", "build" ]
publicDir = "artifacts/handy-gps/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19705"
BASE_PATH = "/"
